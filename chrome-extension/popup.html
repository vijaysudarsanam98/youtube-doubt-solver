<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>YouTube Doubt Solver</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 360px;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 14px;
    }
    h1 { margin: 0 0 6px; font-size: 1rem; }
    .meta { color: var(--muted); font-size: 0.78rem; margin-bottom: 10px; }
    label { display: block; color: var(--muted); font-size: 0.78rem; margin: 8px 0 4px; }
    input, textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      font: inherit;
      outline: none;
    }
    textarea { min-height: 70px; resize: vertical; }
    input:focus, textarea:focus { border-color: var(--accent); }
    button {
      margin-top: 10px;
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 10px;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    pre {
      margin-top: 10px;
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      max-height: 220px;
      overflow: auto;
      white-space: pre-wrap;
      font-size: 0.85rem;
    }
    .row { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
    .pill {
      font-size: 0.72rem;
      background: rgba(56,189,248,0.12);
      color: var(--accent);
      padding: 3px 8px;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="row">
    <h1>YouTube Doubt Solver</h1>
    <span id="timePill" class="pill">--:--</span>
  </div>
  <div class="meta" id="videoMeta">Open a YouTube video tab.</div>

  <label for="apiBase">Backend URL</label>
  <input id="apiBase" value="https://youtube-doubt-solver.onrender.com" />

  <label for="question">Your doubt</label>
  <textarea id="question" placeholder="What is the speaker explaining right now?"></textarea>

  <button id="askBtn" disabled>Ask Gemini</button>
  <pre id="result">Detecting current video moment...</pre>

  <script src="popup.js"></script>
</body>
</html>
